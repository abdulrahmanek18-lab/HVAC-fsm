services:
  - type: web
    name: hvac-fms-api
    runtime: python
    plan: starter
    region: singapore
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: APP_NAME
        value: HVAC Field Management System

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SCRIBE_API_BASE_URL
        sync: false

      - key: SCRIBE_API_KEY
        sync: false

      - key: SCRIBE_TEMPLATE_ID
        sync: false

      - key: CORS_ORIGINS
        sync: false
